# Long Video Bench, Qwen3-VL, 32 frames.
# Paper accuracy: 67.4%.

defaults:
  - ../default

data:
  input_path: ${oc.env:TOOLMERGE_DATA_DIR,data}/longvideobench/lvb_val_std.json
  save_path: ${oc.env:TOOLMERGE_OUTPUT_DIR,outputs}/lvb_qwen3_32

siglip_feature_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/siglip/longvideobench
tren_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/tren/longvideobench
ocr_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr/longvideobench
ocr_judge_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr_judge/longvideobench

max_final_k: 32
model_backend: qwen3vl
