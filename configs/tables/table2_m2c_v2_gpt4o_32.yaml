# Paper Table 2 — Molmo-2 Moments v2 test, GPT-4o answerer, 32 frames.
# Reanswer from the m2c_v2 Qwen3 8f run via `data.source_dir`.

defaults:
  - ../default

data:
  input_path: ${oc.env:TOOLMERGE_DATA_DIR,data}/m2c_v2/test.json
  save_path: ${oc.env:TOOLMERGE_OUTPUT_DIR,outputs}/table2_m2c_v2_gpt4o_32
  video_dir: ${oc.env:TOOLMERGE_DATA_DIR,data}/m2c_v2/videos

siglip_feature_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/siglip/m2c_v2
tren_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/tren/m2c_v2
ocr_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr/m2c_v2
ocr_judge_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr_judge/m2c_v2

max_final_k: 32
model_backend: openai
openai:
  model_name: gpt-4o
