# Paper Table 3 — Molmo-2 Moments QA, Qwen3-VL, 8 frames.
# Expected accuracy: 61.6% (zero-shot), 63.0% (+GRPO).
# To reproduce the +GRPO row, point model.base at the released GRPO checkpoint.

defaults:
  - ../default

data:
  input_path: ${oc.env:TOOLMERGE_DATA_DIR,data}/m2m/test.json
  save_path: ${oc.env:TOOLMERGE_OUTPUT_DIR,outputs}/table3_m2m_qa_qwen3_8

siglip_feature_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/siglip/molmo2_moments
tren_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/tren/molmo2_moments
ocr_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr/molmo2_moments
ocr_judge_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr_judge/molmo2_moments

max_final_k: 8
model_backend: qwen3vl

answer_generator:
  prompt_template: v1
