# Paper Table 2 — Video-MME (full, all 3 length buckets, 2700 questions), Qwen3-VL answerer, 32 frames.
# Reanswer from the VMME Qwen3 8f run via `data.source_dir`.

defaults:
  - ../default

data:
  input_path: ${oc.env:TOOLMERGE_DATA_DIR,data}/video_mme/video_mme_all.json
  save_path: ${oc.env:TOOLMERGE_OUTPUT_DIR,outputs}/table2_vmme_qwen3_32
  video_dir: ${oc.env:TOOLMERGE_DATA_DIR,data}/video_mme/videos

siglip_feature_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/siglip/video_mme
tren_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/tren/video_mme
ocr_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr/video_mme
ocr_judge_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr_judge/video_mme

max_final_k: 32
model_backend: qwen3vl
