# Tiny smoke run on M2C-v2 val — confirms the pipeline runs end-to-end.
# Submit with scripts/slurm/run_table.sbatch.

defaults:
  - ../default

model:
  base: Qwen/Qwen3-VL-8B-Instruct
  attn_implementation: flash_attention_2
  device_map: auto

data:
  input_path: ${oc.env:TOOLMERGE_DATA_DIR,data}/m2c_v2/val.json
  save_path: ???                       # overridden by the Slurm launcher
  video_dir: ${oc.env:TOOLMERGE_DATA_DIR,data}/m2c_v2/videos
  video_backend: opencv

siglip_feature_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/siglip/m2c_v2
tren_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/tren/m2c_v2
ocr_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr/m2c_v2
ocr_judge_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr_judge/m2c_v2

# OCR judge via OpenAI / Azure GPT-4o-mini.
ocr_llm_model: openai:gpt-4o-mini

# Answerer = local Qwen3-VL-8B; planner reuses it.
model_backend: qwen3vl

max_final_k: 8
