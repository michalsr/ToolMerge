# Molmo-2 Moments (M2M) test, Qwen3-VL answerer, 32 frames.
# Typically run as a reanswer over the M2M Qwen3 8f run via `data.source_dir`.

defaults:
  - ../default

data:
  input_path: ${oc.env:TOOLMERGE_DATA_DIR,data}/m2m/test.json
  save_path: ${oc.env:TOOLMERGE_OUTPUT_DIR,outputs}/m2m_qwen3_32
  video_dir: ${oc.env:TOOLMERGE_DATA_DIR,data}/m2m/videos

siglip_feature_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/siglip/m2m
tren_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/tren/m2m
ocr_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr/m2m
ocr_judge_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr_judge/m2m

max_final_k: 32
model_backend: qwen3vl
