# Caption retrieval (1000-caption set).
#
# Reads the caption (instead of the question + answer choices) as the planner
# query. The same `v7_no_temporal` prompt is used for caption retrieval.

defaults:
  - ../default

data:
  input_path: ${oc.env:TOOLMERGE_DATA_DIR,data}/m2m/captions_1k.json
  save_path: ${oc.env:TOOLMERGE_OUTPUT_DIR,outputs}/m2m_caption_retrieval

siglip_feature_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/siglip/m2m
tren_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/tren/m2m
ocr_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr/m2m
ocr_judge_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr_judge/m2m

# Pools at K=8/16/32 (each with its own auto-tau). K=1 is derived as
# argmax of `all_scores` and K=2/4 as pool_8 head during aggregation.
pool_k_values: [8, 16, 32]
max_final_k: 8
model_backend: qwen3vl
