# Inference config used at GRPO training reward time.
#
# Standard ToolMergeConfig YAML — the GRPO trainer calls the inference pipeline
# with this config to score each rollout. The planner-* fields below are
# IGNORED during training (the planner output comes from the rollout itself).

model:
  base: Qwen/Qwen3-VL-8B-Instruct
  attn_implementation: flash_attention_2
  device_map: auto

data:
  input_path: ${oc.env:TOOLMERGE_DATA_DIR,data}/m2m/train.json
  save_path: ${save_path}
  video_dir: ${oc.env:TOOLMERGE_DATA_DIR,data}/m2m/videos
  video_backend: cv2
  frame_cache_dir: ""
  start_idx: 0
  end_idx: null

model_backend: qwen3vl
qwen_version: qwen3

# Planner — ignored during training (rollout provides the plan).
planner_prompt: v7_no_temporal
planner_max_new_tokens: 512
planner_temperature: 0.0
planner_do_sample: false
planner_num_frames: 0

# Tool scoring
enabled_tools:
  - siglip
  - tren
siglip_feature_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/siglip/m2m
tren_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/tren/m2m
ocr_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr/m2m
ocr_judge_cache_dir: ${oc.env:TOOLMERGE_CACHE_DIR,caches}/ocr_judge/m2m

# Thresholding — disabled (top-k only).
score_threshold_mode: percentile
score_threshold_value: 0.0
min_frames_per_query: 16
max_final_k: 8
min_frame_gap_seconds: -1  # auto: duration/(max_final_k*2), cap 10s

# Segment-based peak detection
use_segment_detection: false
peak_std_k: 2.0
segment_mode: threshold_only
peak_drop_pct: 0.10
segment_merge_gap: 5

# OCR LLM-judged. Reads OPENAI_API_KEY / OPENAI_BASE_URL from env at runtime.
ocr_llm_model: openai:gpt-4o-mini
ocr_llm_max_tokens: 256
ocr_batch_size: 20
ocr_pool_seconds: -1

# Answer generator — lif prompt (matches downstream eval), temperature 0.
answer_generator:
  prompt_template: lif
  max_new_tokens: 128
  temperature: 0.0
  top_p: 1.0
  top_k: 1
  do_sample: false
  mode: letter_only

save_trace: true
save_path: ${oc.env:SAVE_PATH,${oc.env:TOOLMERGE_OUTPUT_DIR,outputs}/grpo_train_inference}
save_every_n: 5
seed: 42
debug: false
